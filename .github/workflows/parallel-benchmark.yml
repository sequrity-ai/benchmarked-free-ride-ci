name: Parallel Model Benchmarks

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      max_models:
        description: 'Maximum number of models to test'
        required: false
        default: '15'  # Can benchmark many more models with parallelization
      max_parallel:
        description: 'Maximum parallel jobs to run'
        required: false
        default: '5'  # Balance between speed and resource usage
      scenarios:
        description: 'Scenarios to run (comma-separated: file, weather, web)'
        required: false
        default: 'file,weather,web'
      difficulty:
        description: 'Task difficulty (easy/medium/hard/all)'
        required: false
        default: 'easy'

jobs:
  # Step 1: Discover models and prepare matrix
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      total_models: ${{ steps.set-matrix.outputs.total_models }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build Docker image
        run: |
          docker build -t benchmarked-free-ride:latest .

      - name: Discover models
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          docker run --rm \
            -e OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
            -v $(pwd)/output:/app/output \
            benchmarked-free-ride:latest \
            python3 src/discover_models.py

      - name: Prepare matrix
        id: set-matrix
        run: |
          MAX_MODELS="${{ github.event.inputs.max_models || '15' }}"

          # Read model IDs from matrix file and limit to max_models
          MODELS=$(cat output/matrix_models.json | jq -c ".[:${MAX_MODELS}]")
          TOTAL=$(echo "$MODELS" | jq 'length')

          echo "matrix=${MODELS}" >> $GITHUB_OUTPUT
          echo "total_models=${TOTAL}" >> $GITHUB_OUTPUT

          echo "Will benchmark ${TOTAL} models:"
          echo "$MODELS" | jq -r '.[]'

      - name: Upload discovery artifacts
        uses: actions/upload-artifact@v4
        with:
          name: discovery-results
          path: |
            output/discovered_models.json
            output/discovered_models.txt
            output/matrix_models.json
          retention-days: 30

  # Step 2: Benchmark models in parallel
  benchmark:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Per-model timeout (each model ~18 min)

    strategy:
      fail-fast: false  # Continue even if some models fail
      max-parallel: ${{ fromJson(github.event.inputs.max_parallel || '5') }}
      matrix:
        model_id: ${{ fromJson(needs.discover.outputs.matrix) }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build Docker image
        run: |
          docker build -t benchmarked-free-ride:latest .

      - name: Benchmark model ${{ matrix.model_id }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          SCENARIOS="${{ github.event.inputs.scenarios || 'file,weather,web' }}"
          DIFFICULTY="${{ github.event.inputs.difficulty || 'easy' }}"

          # Create safe filename
          SAFE_MODEL_NAME=$(echo "${{ matrix.model_id }}" | sed 's/[\/:]/_/g')

          echo "Benchmarking model: ${{ matrix.model_id }}"
          echo "  Scenarios: $SCENARIOS"
          echo "  Difficulty: $DIFFICULTY"

          # Run benchmarks in Docker for this single model
          docker run --rm \
            -e OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
            -e OPENAI_API_KEY="$OPENROUTER_API_KEY" \
            -e TAVILY_API_KEY="$TAVILY_API_KEY" \
            -e LOCAL_MODE=true \
            -v $(pwd)/output:/app/output \
            benchmarked-free-ride:latest \
            bash -c "
              echo 'Configuring skills...'
              bash scripts/configure_skills.sh

              echo 'Creating temporary model list...'
              mkdir -p output
              cat > output/temp_model_list.json <<EOF
{
  \"discovered_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
  \"total_models\": 1,
  \"models\": [{
    \"id\": \"${{ matrix.model_id }}\"
  }]
}
EOF

              echo 'Running utility benchmarks...'
              python3 src/run_benchmarks.py \
                --discovered-models output/temp_model_list.json \
                --sandbox-path ./openclawbench \
                --output-dir output/benchmarks \
                --scenarios '$SCENARIOS' \
                --single-turn \
                --difficulty '$DIFFICULTY' \
                --max-models 1 \
                --run-safety \
                --agentdojo-dir ./agentdojo
            "

      - name: Upload benchmark results for ${{ matrix.model_id }}
        uses: actions/upload-artifact@v4
        if: always()  # Upload even if benchmark failed
        with:
          name: benchmark-results-${{ strategy.job-index }}
          path: |
            output/benchmarks/utility/*.json
            output/benchmarks/safety/*.json
          retention-days: 30

  # Step 3: Aggregate results and generate report
  report:
    needs: [discover, benchmark]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: always()  # Run even if some benchmarks failed

    permissions:
      contents: write  # Required for pushing to gh-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Download discovery artifacts
        uses: actions/download-artifact@v4
        with:
          name: discovery-results
          path: output

      - name: Aggregate benchmark results
        run: |
          echo "Aggregating results from all benchmark jobs..."
          mkdir -p output/benchmarks/utility
          mkdir -p output/benchmarks/safety

          # Copy all benchmark results to output directory
          find artifacts -name "*.json" -type f | while read file; do
            if [[ "$file" == *"/utility/"* ]]; then
              cp "$file" output/benchmarks/utility/
            elif [[ "$file" == *"/safety/"* ]]; then
              cp "$file" output/benchmarks/safety/
            fi
          done

          echo "Utility results:"
          ls -lh output/benchmarks/utility/ || echo "No utility results"

          echo "Safety results:"
          ls -lh output/benchmarks/safety/ || echo "No safety results"

      - name: Build Docker image for reporting
        run: |
          docker build -t benchmarked-free-ride:latest .

      - name: Generate HTML report
        run: |
          docker run --rm \
            -v $(pwd)/output:/app/output \
            -v $(pwd)/docs:/app/docs \
            benchmarked-free-ride:latest \
            python3 src/generate_report.py \
              --benchmarks-dir output/benchmarks \
              --output-dir docs

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-${{ github.run_number }}
          path: |
            output/
            docs/
          retention-days: 30

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: 'Update parallel benchmark results - ${{ github.run_number }}'

      - name: Create summary
        run: |
          TOTAL_MODELS="${{ needs.discover.outputs.total_models }}"

          echo "## Parallel Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎯 **Models benchmarked:** ${TOTAL_MODELS}" >> $GITHUB_STEP_SUMMARY
          echo "⚡ **Parallel jobs:** ${{ github.event.inputs.max_parallel || '5' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **View Leaderboard:** [GitHub Pages](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **API Endpoints:**" >> $GITHUB_STEP_SUMMARY
          echo "- [All Models](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/api/models.json)" >> $GITHUB_STEP_SUMMARY
          echo "- [Leaderboard](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/api/leaderboard.json)" >> $GITHUB_STEP_SUMMARY
