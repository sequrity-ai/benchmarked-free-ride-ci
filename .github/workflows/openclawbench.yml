name: OpenClawBench Benchmarks

on:
  schedule:
    - cron: '0 2 */2 * *'  # Every 2 days at 2 AM UTC (odd days: 1,3,5...)
  workflow_dispatch:
    inputs:
      max_models:
        description: 'Maximum number of models to test'
        required: false
        default: '15'
      max_parallel:
        description: 'Maximum parallel jobs to run'
        required: false
        default: '5'
      scenarios:
        description: 'Scenarios to run (comma-separated: file, weather, web)'
        required: false
        default: 'file,weather,web'
      difficulty:
        description: 'Task difficulty (easy/medium/hard/all)'
        required: false
        default: 'easy'

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      total_models: ${{ steps.set-matrix.outputs.total_models }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and cache Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: benchmarked-free-ride:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image
        run: docker save benchmarked-free-ride:latest | gzip > /tmp/docker-image.tar.gz

      - name: Discover models
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          docker run --rm \
            -e OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
            -v $(pwd)/output:/app/output \
            benchmarked-free-ride:latest \
            python3 src/discover_models.py

      - name: Prepare matrix
        id: set-matrix
        run: |
          MAX_MODELS="${{ github.event.inputs.max_models || '15' }}"
          MODELS=$(cat output/matrix_models.json | jq -c ".[:${MAX_MODELS}]")
          TOTAL=$(echo "$MODELS" | jq 'length')
          echo "matrix=${MODELS}" >> $GITHUB_OUTPUT
          echo "total_models=${TOTAL}" >> $GITHUB_OUTPUT
          echo "Will benchmark ${TOTAL} models:"
          echo "$MODELS" | jq -r '.[]'

      - name: Upload discovery artifacts
        uses: actions/upload-artifact@v4
        with:
          name: discovery-results
          path: |
            output/discovered_models.json
            output/discovered_models.txt
            output/matrix_models.json
          retention-days: 30

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar.gz
          retention-days: 1

  benchmark:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(github.event.inputs.max_parallel || '5') }}
      matrix:
        model_id: ${{ fromJson(needs.discover.outputs.matrix) }}

    permissions:
      contents: read

    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/docker-image.tar.gz

      - name: Benchmark model ${{ matrix.model_id }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          SCENARIOS="${{ github.event.inputs.scenarios || 'file,weather,web' }}"
          DIFFICULTY="${{ github.event.inputs.difficulty || 'easy' }}"

          echo "Benchmarking model: ${{ matrix.model_id }}"
          echo "  Scenarios: $SCENARIOS"
          echo "  Difficulty: $DIFFICULTY"

          mkdir -p output
          python3 -c "
          import json, datetime
          data = {
              'discovered_at': datetime.datetime.utcnow().isoformat() + 'Z',
              'total_models': 1,
              'models': [{'id': '${{ matrix.model_id }}'}]
          }
          with open('output/temp_model_list.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

          docker run --rm \
            -e OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
            -e DAYTONA_API_KEY="$DAYTONA_API_KEY" \
            -e TAVILY_API_KEY="$TAVILY_API_KEY" \
            -v $(pwd)/output:/app/output \
            benchmarked-free-ride:latest \
            python3 src/run_benchmarks.py \
              --discovered-models output/temp_model_list.json \
              --sandbox-path ./openclawbench \
              --output-dir output/benchmarks \
              --scenarios "$SCENARIOS" \
              --difficulty "$DIFFICULTY" \
              --provider openrouter \
              --backend daytona \
              --max-models 1

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openclaw-${{ strategy.job-index }}
          path: output/benchmarks/utility/*.json
          retention-days: 30

  report:
    needs: [discover, benchmark]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: always()

    permissions:
      contents: write

    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/docker-image.tar.gz

      - name: Download discovery artifacts
        uses: actions/download-artifact@v4
        with:
          name: discovery-results
          path: output

      - name: Download new benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openclaw-*
          path: artifacts

      - name: Fetch existing results from gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Merge results
        run: |
          mkdir -p output/benchmarks/utility
          mkdir -p output/benchmarks/safety

          # Pull existing results from gh-pages
          if [ -d gh-pages/data/utility ]; then
            cp gh-pages/data/utility/*.json output/benchmarks/utility/ 2>/dev/null || true
          fi
          if [ -d gh-pages/data/safety ]; then
            cp gh-pages/data/safety/*.json output/benchmarks/safety/ 2>/dev/null || true
          fi

          echo "Existing utility results: $(ls output/benchmarks/utility/ 2>/dev/null | wc -l) files"
          echo "Existing safety results: $(ls output/benchmarks/safety/ 2>/dev/null | wc -l) files"

          # Overlay new utility results (overwrites same-model files)
          find artifacts -name "*.json" -type f | while read file; do
            cp "$file" output/benchmarks/utility/
          done

          echo "After merge - utility: $(ls output/benchmarks/utility/ | wc -l) files"
          echo "After merge - safety: $(ls output/benchmarks/safety/ | wc -l) files"

      - name: Generate report
        run: |
          docker run --rm \
            -v $(pwd)/output:/app/output \
            -v $(pwd)/docs:/app/docs \
            benchmarked-free-ride:latest \
            python3 src/generate_report.py \
              --benchmarks-dir output/benchmarks \
              --output-dir docs

      - name: Persist raw results for other workflows
        run: |
          mkdir -p docs/data/utility docs/data/safety
          cp output/benchmarks/utility/*.json docs/data/utility/ 2>/dev/null || true
          cp output/benchmarks/safety/*.json docs/data/safety/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: 'Update OpenClawBench results - ${{ github.run_number }}'

      - name: Create summary
        run: |
          TOTAL_MODELS="${{ needs.discover.outputs.total_models }}"
          echo "## OpenClawBench Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Models benchmarked:** ${TOTAL_MODELS}" >> $GITHUB_STEP_SUMMARY
          echo "**Parallel jobs:** ${{ github.event.inputs.max_parallel || '5' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**View Leaderboard:** [GitHub Pages](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }})" >> $GITHUB_STEP_SUMMARY
